name: Build Kernel Injector (SYS and EXE)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download and Install WDK (via WinGet)
      shell: powershell
      run: |
        Write-Host "Installation du Windows Driver Kit..."
        winget install --id Microsoft.WindowsWDK.10.0.22621 --exact --silent --accept-package-agreements --accept-source-agreements

    - name: Split and Patch Projects
      shell: powershell
      run: |
        $src = "kernelmode.vcxproj"
        if (Test-Path $src) {
            $content = Get-Content $src -Raw
            
            Write-Host "1. Création du projet Loader (.exe)..."
            $loaderContent = $content -replace '<ClCompile Include="moderninjector.cpp" />', ''
            $loaderContent = $loaderContent -replace '<ClCompile Include="test_client.cpp" />', ''
            Set-Content -Path "build_loader.vcxproj" -Value $loaderContent
            
            Write-Host "2. Création du projet Driver (.sys)..."
            # CORRECTION DE L'ERREUR DE L'AUTEUR : ajout du tiret du bas
            $driverContent = $content -replace 'moderninjector.cpp', 'modern_injector.cpp'
            
            # Nettoyage des fichiers Ring 3
            $driverContent = $driverContent -replace '<ClCompile Include="loader.cpp" />', ''
            $driverContent = $driverContent -replace '<ClCompile Include="test_client.cpp" />', ''
            
            # Transformation en pilote noyau
            $driverContent = $driverContent -replace '<ConfigurationType>Application</ConfigurationType>', '<ConfigurationType>Driver</ConfigurationType>'
            $driverContent = $driverContent -replace '<SubSystem>Console</SubSystem>', '<SubSystem>Native</SubSystem>'
            
            Set-Content -Path "build_driver.vcxproj" -Value $driverContent
            
            Write-Host "Patching terminé avec succès !"
        } else {
            Write-Error "Fichier $src introuvable !"
            exit 1
        }

    - name: Build Loader (.exe)
      run: msbuild build_loader.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Build Driver (.sys)
      run: msbuild build_driver.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Complete-Injector-Kit
        path: |
          **\Release\*.exe
          **\Release\*.sys
