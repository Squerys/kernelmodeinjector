name: Build Kernel Injector

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Install Windows Driver Kit (WDK)
      uses: numworks/setup-wdk@v1 # Une action communautaire pour installer le WDK
      
    - name: Build User-Mode Loader (.exe)
      run: msbuild loader\loader.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Build Kernel Driver (.sys)
      run: msbuild driver\driver.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Compiled-Injector
        path: |
          **\Release\*.exe
          **\Release\*.sys
