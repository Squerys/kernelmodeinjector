name: Build Kernel Injector

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Mis à jour en v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2 # Mis à jour en v2

    - name: Download and Install WDK (via WinGet)
      shell: powershell
      run: |
        # On installe directement le paquet WDK officiel pour Windows 11 / Server 2022
        winget install --id Microsoft.WindowsWDK.10.0.22621 --exact --silent --accept-package-agreements --accept-source-agreements
        
        # Le script attend automatiquement la fin de l'installation silencieuse

    - name: Build User-Mode Loader (.exe)
      # Assurez-vous que le chemin vers le fichier .vcxproj correspond à la structure du dépôt
      run: msbuild loader/loader.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Build Kernel Driver (.sys)
      # Assurez-vous que le chemin vers le fichier .vcxproj correspond à la structure du dépôt
      run: msbuild driver/driver.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4 # Mis à jour en v4
      with:
        name: Compiled-Injector
        path: |
          **\Release\*.exe
          **\Release\*.sys
