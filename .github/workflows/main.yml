name: Build Kernel Injector (eWDK Edition)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild (For User-Mode Loader)
      uses: microsoft/setup-msbuild@v2
      
    - name: Split and Patch Projects
      shell: powershell
      run: |
        $src = "kernelmode.vcxproj"
        
        Write-Host "1. Création du projet Loader (.exe)..."
        $content = Get-Content $src -Raw
        $loaderContent = $content -replace '<ClCompile Include="moderninjector.cpp" />', ''
        $loaderContent = $loaderContent -replace '<ClCompile Include="test_client.cpp" />', ''
        Set-Content -Path "build_loader.vcxproj" -Value $loaderContent
        
        Write-Host "2. Création d'un projet Driver (.sys) parfait pour MSBuild..."
        $driverXml = @"
        <?xml version="1.0" encoding="utf-8"?>
        <Project DefaultTargets="Build" ToolsVersion="12.0" xmlns="http://schemas.microsoft.com/developer/msbuild/2003">
          <ItemGroup Label="ProjectConfigurations">
            <ProjectConfiguration Include="Release|x64">
              <Configuration>Release</Configuration>
              <Platform>x64</Platform>
            </ProjectConfiguration>
          </ItemGroup>
          <PropertyGroup Label="Globals">
            <ProjectGuid>{88888888-4444-4444-4444-123456789012}</ProjectGuid>
            <RootNamespace>modern_injector</RootNamespace>
            <WindowsTargetPlatformVersion>10.0.22621.0</WindowsTargetPlatformVersion>
          </PropertyGroup>
          <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.Default.props" />
          
          <!-- LE LABEL MAGIQUE EST ICI -->
          <PropertyGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|x64'" Label="Configuration">
            <ConfigurationType>Driver</ConfigurationType>
            <DriverType>WDM</DriverType>
            <PlatformToolset>WindowsKernelModeDriver10.0</PlatformToolset>
          </PropertyGroup>
          
          <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.props" />
          <ItemDefinitionGroup Condition="'`$(Configuration)|`$(Platform)'=='Release|x64'">
            <ClCompile>
              <BufferSecurityCheck>false</BufferSecurityCheck>
              <TreatWarningAsError>false</TreatWarningAsError>
            </ClCompile>
            <Link>
              <EntryPointSymbol>DriverEntry</EntryPointSymbol>
            </Link>
          </ItemDefinitionGroup>
          <ItemGroup>
            <ClCompile Include="modern_injector.cpp" />
          </ItemGroup>
          <Import Project="`$(VCTargetsPath)\Microsoft.Cpp.targets" />
        </Project>
        "@
        Set-Content -Path "build_driver.vcxproj" -Value $driverXml
    - name: Build Loader (.exe)
      run: msbuild build_loader.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Download and Mount Enterprise WDK (eWDK)
      shell: powershell
      run: |
        Write-Host "Téléchargement du véritable eWDK via cURL (environ 20 Go, patience)..."
        # Le bon lien Microsoft vers l'ISO de l'eWDK Windows 11 22H2
        curl.exe -L -o ewdk.iso "https://go.microsoft.com/fwlink/?linkid=2237475"
        
        Write-Host "Vérification de la taille du fichier téléchargé :"
        $sizeGB = (Get-Item ewdk.iso).Length / 1GB
        Write-Host "$([math]::Round($sizeGB, 2)) Go"
        
        Write-Host "Montage de l'ISO..."
        $mount = Mount-DiskImage -ImagePath "$PWD\ewdk.iso" -PassThru
        $drive = ($mount | Get-Volume).DriveLetter
        
        Write-Host "eWDK monté avec succès sur le lecteur ${drive}:\"
        echo "EWDK_DRIVE=$drive" >> $env:GITHUB_ENV

    - name: Build Driver (.sys) using eWDK
      shell: cmd
      run: |
        echo "Initialisation de l'environnement WDK isolé..."
        call %EWDK_DRIVE%:\BuildEnv\SetupBuildEnv.cmd
        echo "Compilation du pilote noyau..."
        msbuild build_driver.vcxproj /p:Configuration=Release /p:Platform=x64

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Complete-Injector-Kit
        path: |
          **\Release\*.exe
          **\Release\*.sys
